<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh sách sản phẩm - TechStore</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components/header.css">
  <link rel="stylesheet" href="css/product-list.css">
</head>
<body>
  <!-- Header -->
  <header class="header" id="header">
    <div class="header__top">
      <div class="container header__inner">
        <a href="index.html" class="header__logo">
          <span class="header__logo-icon">◆</span>
          <span class="header__logo-text">TechStore</span>
        </a>

        <form class="header__search" action="#" role="search">
          <input
            type="search"
            class="header__search-input"
            placeholder="Tìm kiếm laptop, điện thoại, phụ kiện..."
            aria-label="Tìm kiếm sản phẩm"
          >
          <button type="submit" class="header__search-btn" aria-label="Tìm kiếm">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35"/>
            </svg>
          </button>
        </form>

        <div class="header__actions">
          <a href="#account" class="header__action" aria-label="Tài khoản">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <span class="header__action-label">Tài khoản</span>
          </a>
          <a href="#cart" class="header__action header__action--cart" aria-label="Giỏ hàng">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="9" cy="21" r="1"/>
              <circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            <span class="header__cart-count">0</span>
            <span class="header__action-label">Giỏ hàng</span>
          </a>
          <button type="button" class="header__toggle" id="navToggle" aria-label="Mở menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="nav" id="nav">
      <div class="container">
        <ul class="nav__list">
          <li class="nav__item">
            <a href="index.html" class="nav__link">Trang chủ</a>
          </li>
          <li class="nav__item">
            <a href="product-list.html" class="nav__link nav__link--active">Sản phẩm</a>
          </li>
          <li class="nav__item">
            <a href="product-detail.html" class="nav__link">Chi tiết sản phẩm</a>
          </li>
          <li class="nav__item">
            <a href="#lien-he" class="nav__link">Liên hệ</a>
          </li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="main">
    <div class="container">
      <h1 class="page-title">Danh sách sản phẩm</h1>

      <!-- Thanh tìm kiếm và lọc -->
      <div class="toolbar">
      <div class="toolbar__search">
        <input
          type="text"
          id="searchInput"
          class="toolbar__search-input"
          placeholder="Tìm kiếm sản phẩm..."
          aria-label="Tìm kiếm sản phẩm"
        >
      </div>

      <div class="toolbar__filters">
        <button class="filter-btn filter-btn--active" data-category="all">Tất cả</button>
        <button class="filter-btn" data-category="dien-thoai">Điện thoại</button>
        <button class="filter-btn" data-category="laptop">Laptop</button>
        <button class="filter-btn" data-category="tablet">Tablet</button>
        <button class="filter-btn" data-category="phu-kien">Phụ kiện</button>
      </div>

      <div class="toolbar__sort">
        <select id="sortSelect" class="toolbar__sort-select" aria-label="Sắp xếp sản phẩm">
          <option value="default">Sắp xếp</option>
          <option value="price-asc">Giá tăng dần</option>
          <option value="price-desc">Giá giảm dần</option>
          <option value="name-asc">Tên A → Z</option>
        </select>
      </div>
    </div>

    <!-- Danh sách sản phẩm (render bằng JS) -->
    <div class="product-grid" id="productGrid"></div>
    </div>
  </main>

  <script src="js/components/header.js"></script>
  <script src="js/product-list.js"></script>
</body>
</html>
