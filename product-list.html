<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh sách sản phẩm - TechStore</title>
  <link rel="stylesheet" href="css/product-list.css">
</head>
<body>
  <div class="container">
    <h1 class="page-title">Danh sách sản phẩm</h1>

    <!-- Thanh tìm kiếm và lọc -->
    <div class="toolbar">
      <div class="toolbar__search">
        <input
          type="text"
          id="searchInput"
          class="toolbar__search-input"
          placeholder="Tìm kiếm sản phẩm..."
        >
      </div>

      <div class="toolbar__filters">
        <button class="filter-btn filter-btn--active" data-category="all">Tất cả</button>
        <button class="filter-btn" data-category="dien-thoai">Điện thoại</button>
        <button class="filter-btn" data-category="laptop">Laptop</button>
        <button class="filter-btn" data-category="tablet">Tablet</button>
        <button class="filter-btn" data-category="phu-kien">Phụ kiện</button>
      </div>

      <div class="toolbar__sort">
        <select id="sortSelect" class="toolbar__sort-select">
          <option value="default">Sắp xếp</option>
          <option value="price-asc">Giá tăng dần</option>
          <option value="price-desc">Giá giảm dần</option>
          <option value="name-asc">Tên A → Z</option>
        </select>
      </div>
    </div>

    <!-- Danh sách sản phẩm (render bằng JS) -->
    <div class="product-grid" id="productGrid"></div>
  </div>

  <script src="js/product-list.js"></script>
</body>
</html>
