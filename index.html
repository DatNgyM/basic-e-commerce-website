<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ - E-BookStore</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f0f2f5;
        }
        .welcome-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { color: #333; }
        p { color: #666; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            text-decoration: none;
            color: white;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn-login { background-color: #4a90e2; }
        .btn-login:hover { background-color: #357abd; }
        .btn-register { background-color: #28a745; }
        .btn-register:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="welcome-box">
        <h1>Chào mừng đến với E-BookStore</h1>
        <p>Trang web thương mại điện tử đơn giản của bạn.</p>
        <a href="login.html" class="btn btn-login">Đăng Nhập</a>
        <a href="register.html" class="btn btn-register">Đăng Ký</a>
    </div>
</body>
</html>
