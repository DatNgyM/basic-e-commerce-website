<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - TechStore</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components/header.css">
    <link rel="stylesheet" href="css/components/checkout.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <h1>TechStore</h1>
            </div>
            <nav class="nav">
                <ul>
                    <li><a href="index.html">Trang chủ</a></li>
                    <li><a href="product-list.html">Sản phẩm</a></li>
                    <li><a href="checkout.html">Giỏ hàng</a></li>
                    <li><a href="#contact">Liên hệ</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="checkout-section">
            <h1>Trang Thanh Toán</h1>
            <p>Vui lòng nhập thông tin để hoàn tất đơn hàng.</p>

            <form>
                <div class="form-group">
                    <label for="fullname">Họ và tên</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>

                <div class="form-group">
                    <label for="address">Địa chỉ</label>
                    <input type="text" id="address" name="address" required>
                </div>

                <div class="form-group">
                    <label for="phone">Số điện thoại</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <button type="submit" class="btn-order">Đặt hàng</button>
            </form>

            <div class="checkout-links">
                <a href="index.html">← Quay lại trang chủ</a>
                <a href="product-list.html">Tiếp tục mua sắm →</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 TechStore. All rights reserved.</p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/components/header.js"></script>
</body>
</html>
