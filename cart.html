<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giỏ hàng - TechStore</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components/header.css">
  <link rel="stylesheet" href="css/components/cart.css">
</head>
<body>
  <header class="header" id="header">
    <div class="header__top">
      <div class="container header__inner">
        <a href="index.html" class="header__logo">
          <span class="header__logo-icon">◆</span>
          <span class="header__logo-text">TechStore</span>
        </a>
        <form class="header__search" action="#" role="search">
          <input type="search" class="header__search-input" placeholder="Tìm kiếm laptop, điện thoại, phụ kiện..." aria-label="Tìm kiếm sản phẩm">
          <button type="submit" class="header__search-btn" aria-label="Tìm kiếm">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </button>
        </form>
        <div class="header__actions">
          <a href="login.html" class="header__action" aria-label="Tài khoản">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="header__action-label">Tài khoản</span>
          </a>
          <a href="cart.html" class="header__action header__action--cart" aria-label="Giỏ hàng">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            <span class="header__cart-count">0</span>
            <span class="header__action-label">Giỏ hàng</span>
          </a>
          <button type="button" class="header__toggle" id="navToggle" aria-label="Mở menu" aria-expanded="false"><span></span><span></span><span></span></button>
        </div>
      </div>
    </div>
    <nav class="nav" id="nav">
      <div class="container">
        <ul class="nav__list">
          <li class="nav__item"><a href="index.html" class="nav__link">Trang chủ</a></li>
          <li class="nav__item nav__item--dropdown"><a href="#laptop" class="nav__link">Laptop</a>
            <ul class="nav__dropdown">
              <li><a href="#laptop-gaming">Laptop Gaming</a></li>
              <li><a href="#laptop-van-phong">Laptop Văn phòng</a></li>
              <li><a href="#laptop-do-hoa">Laptop Đồ họa</a></li>
            </ul>
          </li>
          <li class="nav__item nav__item--dropdown"><a href="#dien-thoai" class="nav__link">Điện thoại</a>
            <ul class="nav__dropdown">
              <li><a href="#smartphone">Smartphone</a></li>
              <li><a href="#phu-kien-dt">Phụ kiện điện thoại</a></li>
            </ul>
          </li>
          <li class="nav__item"><a href="#phu-kien" class="nav__link">Phụ kiện</a></li>
          <li class="nav__item"><a href="#tin-tuc" class="nav__link">Tin tức</a></li>
          <li class="nav__item"><a href="#lien-he" class="nav__link">Liên hệ</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="main">
    <div class="cart-container">
      <h2>Giỏ hàng của bạn</h2>
      <div class="cart-items">
        <div class="cart-item">
          <span class="product-name">Sản phẩm A</span>
          <input type="number" value="1" class="qty-input" min="1" aria-label="Số lượng">
          <span class="price">100.000đ</span>
        </div>
      </div>
      <div class="cart-footer">
        <p>Tổng cộng: <span id="total-price">100.000đ</span></p>
        <a href="checkout.html" class="checkout-btn">Thanh toán</a>
      </div>
    </div>
  </main>

  <script src="js/components/header.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
