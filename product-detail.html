<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 50px; }
        .container { 
            max-width: 800px; margin: auto; background: #fff; padding: 20px; 
            display: flex; gap: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .price { color: red; font-size: 24px; font-weight: bold; }
        .btn-add { 
            background: #28a745; color: #fff; border: none; padding: 10px 20px; 
            border-radius: 5px; cursor: pointer; width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="product-image">
            <img src="https://vcdn-soha.vnecdn.net/2023/09/13/iphone-15-pro-finish-select-202309-6-1-1694563412.jpg" alt="iPhone 15 Pro Max" width="400">
        </div>

        <div class="product-info">
            <h1>iPhone 15 Pro Max - 256GB Chính hãng</h1>
            <p class="price">29.990.000đ</p>
            
            <div class="description">
                <p>Khung viền Titan, Chip A17 Pro, Hệ thống camera chuyên nghiệp 48MP.</p>
            </div>

            <div class="specs">
                <strong>Thông số kỹ thuật:</strong>
                <ul>
                    <li>Màn hình: 6.7 inch, Super Retina XDR</li>
                    <li>Chip: Apple A17 Pro</li>
                    <li>RAM: 8GB</li>
                </ul>
            </div>
            <button class="btn-add-to-cart">Thêm vào giỏ hàng</button>
        </div>
    </div>
</body>
</html>
