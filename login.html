<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - TechStore</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components/header.css">
    <link rel="stylesheet" href="assets/css/components/auth.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <nav class="navbar">
            <div class="brand-logo">
                <a href="index.html">TechStore</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Trang Chủ</a></li>
                <li><a href="login.html" class="active">Đăng Nhập</a></li>
                <li><a href="register.html">Đăng Ký</a></li>
            </ul>
        </nav>
    </header>

    <div class="main-content">
        <div class="container">
            <h2 class="form-title">Đăng Nhập</h2>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Nhập email của bạn" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                </div>

                <button type="submit" class="btn-submit">Đăng Nhập</button>
                
                <p class="switch-link">
                    Chưa có tài khoản? <a href="register.html">Đăng Ký Ngay</a>
                </p>
            </form>
        </div>
    </div>
</body>
</html>
