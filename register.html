<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - E-BookStore</title>
    <!-- Link đến file CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Tiêu đề -->
        <h2 class="form-title">Đăng Ký Tài Khoản</h2>
        <!-- Form đăng ký -->
        <form action="#" method="POST">
            <div class="form-group">
                <label for="fullname">Họ và Tên</label>
                <input type="text" id="fullname" name="fullname" placeholder="Nhập tên đầy đủ của bạn" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Nhập email của bạn" required>
            </div>
            
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)" minlength="6" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">Xác nhận mật khẩu</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Nhập lại mật khẩu" required>
            </div>

            <!-- Nút đăng ký -->
            <button type="submit" class="btn-submit">Đăng Ký</button>
            
            <!-- Link chuyển sang trang đăng nhập -->
            <p class="switch-link">
                Đã có tài khoản? <a href="login.html">Đăng Nhập Ngay</a>
            </p>
        </form>
    </div>

    <!-- Script nhỏ để validate password (tuỳ chọn) -->
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            var password = document.getElementById('password').value;
            var confirm = document.getElementById('confirm-password').value;
            
            if (password !== confirm) {
                e.preventDefault();
                alert("Mật khẩu xác nhận không khớp!");
            }
        });
    </script>
</body>
</html>
